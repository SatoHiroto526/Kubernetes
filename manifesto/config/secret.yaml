apiVersion: v1
kind: Secret
metadata:
    name: api-secret
data:
    # コンテナ内にマウントする際の記述方法（ConfigMapも同様）
    # 下記の場合、secret.propertiesというファイルが作成され、その中にpassword=cGFzc3dvcmQ=という内容が記述される
    # Secretの場合は必ずBase64エンコードしたデータをvalueに記述する必要がある（でないとエラーになる）
    # コンテナ内では複合された状態で使用される
    # マウントする場合、プロパティファイルのキーも含めすべてBase64エンコードする必要がある　※環境変数として扱う場合は、キーはエンコードする必要がない
    # 以下の場合、「password=password」をBase64エンコードしている
    secret.properties: |
      cGFzc3dvcmQ9cGFzc3dvcmQ=